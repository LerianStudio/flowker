name: "Go Combined Analysis"

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - '.editorconfig'
      - '*.png'
      - '*.jpg'
      - '*.svg'

jobs:
  go-analysis:
    name: Go Analysis
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-analysis.yml@v1.27.5
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      app_name_prefix: "flowker"
      go_version: "1.25.9"
      golangci_lint_version: "v2.7.2"
      golangci_lint_args: "--timeout=5m"
      coverage_threshold: 85
      fail_on_coverage_threshold: false
      enable_lint: true
      enable_security: true
      enable_tests: true
      enable_coverage: true
      enable_build: true
      enable_integration_tests: true
      integration_test_command: "go test -tags=integration,e2e -timeout 10m ./..."
      go_private_modules: "github.com/LerianStudio/*"
    secrets: inherit
