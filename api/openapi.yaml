openapi: 3.0.1
info:
  contact: {}
  description: Workflow orchestration platform for financial validation
  termsOfService: http://swagger.io/terms/
  title: Flowker API
  version: 1.0.0
servers:
- url: //localhost:4021/
paths:
  /health:
    get:
      description: Returns detailed health information including uptime and version
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_health.HealthResponse'
          description: OK
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_health.HealthResponse'
          description: Service Unavailable
      summary: Combined health check
      tags:
      - Health
  /health/live:
    get:
      description: Returns 200 OK if the application process is running
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_health.HealthResponse'
          description: OK
      summary: Kubernetes liveness probe
      tags:
      - Health
  /health/ready:
    get:
      description: Returns 200 OK if the application is ready to serve traffic
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_health.HealthResponse'
          description: OK
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_health.HealthResponse'
          description: Service Unavailable
      summary: Kubernetes readiness probe
      tags:
      - Health
  /v1/audit-events:
    get:
      description: Retrieves a paginated list of audit log entries with optional filtering
      parameters:
      - description: Filter by event type
        in: query
        name: eventType
        schema:
          type: string
      - description: Filter by action
        in: query
        name: action
        schema:
          type: string
      - description: Filter by result
        in: query
        name: result
        schema:
          enum:
          - SUCCESS
          - FAILED
          type: string
      - description: Filter by resource type
        in: query
        name: resourceType
        schema:
          enum:
          - workflow
          - execution
          - provider_config
          type: string
      - description: Filter by resource ID
        in: query
        name: resourceId
        schema:
          format: uuid
          type: string
      - description: Start date filter (RFC3339)
        in: query
        name: dateFrom
        schema:
          format: date-time
          type: string
      - description: End date filter (RFC3339)
        in: query
        name: dateTo
        schema:
          format: date-time
          type: string
      - description: Number of items per page
        in: query
        name: limit
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Sort order
        in: query
        name: sortOrder
        schema:
          default: DESC
          enum:
          - ASC
          - DESC
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.AuditEntryListOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Search audit logs
      tags:
      - Audit
  /v1/audit-events/{id}:
    get:
      description: Retrieves a single audit log entry by its event ID
      parameters:
      - description: Audit event ID
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.AuditEntryOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Get audit entry by ID
      tags:
      - Audit
  /v1/audit-events/{id}/verify:
    get:
      description: Verifies the hash chain integrity up to the specified audit entry
      parameters:
      - description: Audit event ID
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.HashChainVerificationOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Verify audit hash chain
      tags:
      - Audit
  /v1/catalog/executors:
    get:
      description: Returns all built-in executors registered in the catalog
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/internal_adapters_http_in_catalog.ExecutorSummary'
                type: array
          description: OK
      summary: List executors
      tags:
      - Catalog
  /v1/catalog/executors/{id}:
    get:
      description: Returns executor metadata and its JSON Schema
      parameters:
      - description: Executor ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_catalog.ExecutorDetail'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/commons.Response'
          description: Not Found
      summary: Get executor
      tags:
      - Catalog
  /v1/catalog/executors/{id}/validate:
    post:
      description: Validates an executor configuration against its JSON Schema
      parameters:
      - description: Executor ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/internal_adapters_http_in_catalog.ValidationRequest'
        description: Configuration to validate
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_catalog.ValidationResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_catalog.ValidationResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/commons.Response'
          description: Not Found
      summary: Validate executor config
      tags:
      - Catalog
      x-codegen-request-body-name: request
  /v1/catalog/providers:
    get:
      description: Returns all registered providers from the static catalog
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/internal_adapters_http_in_catalog.ProviderSummary'
                type: array
          description: OK
      summary: List providers
      tags:
      - Catalog
  /v1/catalog/providers/{id}:
    get:
      description: Returns provider metadata and its JSON Schema for configuration
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_catalog.ProviderDetail'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/commons.Response'
          description: Not Found
      summary: Get provider
      tags:
      - Catalog
  /v1/catalog/providers/{id}/executors:
    get:
      description: Returns all executors belonging to a specific provider
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/internal_adapters_http_in_catalog.ExecutorSummary'
                type: array
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/commons.Response'
          description: Not Found
      summary: List provider executors
      tags:
      - Catalog
  /v1/catalog/templates:
    get:
      description: Returns all workflow templates registered in the catalog
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/internal_adapters_http_in_catalog.TemplateSummary'
                type: array
          description: OK
      summary: List templates
      tags:
      - Catalog
  /v1/catalog/templates/{id}:
    get:
      description: Returns template metadata and its JSON Schema for parameters
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_catalog.TemplateDetail'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/commons.Response'
          description: Not Found
      summary: Get template
      tags:
      - Catalog
  /v1/catalog/templates/{id}/validate:
    post:
      description: Validates template parameters against its JSON Schema
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/internal_adapters_http_in_catalog.TemplateValidationRequest'
        description: Parameters to validate
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_catalog.ValidationResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_catalog.ValidationResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/commons.Response'
          description: Not Found
      summary: Validate template params
      tags:
      - Catalog
      x-codegen-request-body-name: request
  /v1/catalog/triggers:
    get:
      description: Returns all built-in triggers registered in the catalog
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/internal_adapters_http_in_catalog.TriggerSummary'
                type: array
          description: OK
      summary: List triggers
      tags:
      - Catalog
  /v1/catalog/triggers/{id}:
    get:
      description: Returns trigger metadata and its JSON Schema
      parameters:
      - description: Trigger ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in_catalog.TriggerDetail'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/commons.Response'
          description: Not Found
      summary: Get trigger
      tags:
      - Catalog
  /v1/dashboards/executions:
    get:
      description: Retrieves an aggregated summary of executions with optional time
        range and status filters
      parameters:
      - description: Start time filter (RFC3339)
        in: query
        name: startTime
        schema:
          format: date-time
          type: string
      - description: End time filter (RFC3339)
        in: query
        name: endTime
        schema:
          format: date-time
          type: string
      - description: Status filter
        in: query
        name: status
        schema:
          enum:
          - pending
          - running
          - completed
          - failed
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ExecutionSummaryOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Get execution summary
      tags:
      - Dashboard
  /v1/dashboards/workflows/summary:
    get:
      description: Retrieves an aggregated summary of all workflows grouped by status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.WorkflowSummaryOutput'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Get workflow summary
      tags:
      - Dashboard
  /v1/executions:
    get:
      description: Retrieves a paginated list of workflow executions with optional
        filters
      parameters:
      - description: Filter by workflow ID
        in: query
        name: workflowId
        schema:
          format: uuid
          type: string
      - description: Filter by status
        in: query
        name: status
        schema:
          enum:
          - pending
          - running
          - completed
          - failed
          type: string
      - description: Page size (1-100)
        in: query
        name: limit
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Sort field
        in: query
        name: sortBy
        schema:
          default: startedAt
          enum:
          - startedAt
          - completedAt
          type: string
      - description: Sort direction
        in: query
        name: sortOrder
        schema:
          default: DESC
          enum:
          - ASC
          - DESC
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ExecutionListOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: List executions
      tags:
      - Executions
  /v1/executions/{id}:
    get:
      description: Retrieves the current status of a workflow execution
      parameters:
      - description: Execution ID
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ExecutionStatusOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Get execution status
      tags:
      - Executions
  /v1/executions/{id}/results:
    get:
      description: Retrieves the results of a completed workflow execution
      parameters:
      - description: Execution ID
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ExecutionResultsOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Not Found
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Execution still in progress
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Get execution results
      tags:
      - Executions
  /v1/executors:
    get:
      description: Retrieves a paginated list of executor configurations with optional
        filtering
      parameters:
      - description: Filter by status
        in: query
        name: status
        schema:
          enum:
          - unconfigured
          - configured
          - tested
          - active
          - disabled
          type: string
      - description: Number of items per page
        in: query
        name: limit
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Sort field
        in: query
        name: sortBy
        schema:
          default: createdAt
          enum:
          - createdAt
          - updatedAt
          - name
          type: string
      - description: Sort order
        in: query
        name: sortOrder
        schema:
          default: DESC
          enum:
          - ASC
          - DESC
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ExecutorConfigurationListOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: List executor configurations
      tags:
      - Executors
  /v1/executors/{id}:
    delete:
      description: Deletes an executor configuration (only unconfigured, configured,
        or disabled executor configurations can be deleted)
      parameters:
      - description: Executor Configuration ID
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "204":
          content: {}
          description: No Content
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Not Found
        "409":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Conflict
        "422":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unprocessable Entity
        "500":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Delete an executor configuration
      tags:
      - Executors
    get:
      description: Retrieves an executor configuration by its ID
      parameters:
      - description: Executor Configuration ID
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ExecutorConfigurationOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Get executor configuration by ID
      tags:
      - Executors
    patch:
      description: Updates an existing executor configuration (only unconfigured or
        configured executor configurations can be updated)
      parameters:
      - description: Executor Configuration ID
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.UpdateExecutorConfigurationInput'
        description: Updated executor configuration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ExecutorConfigurationOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Conflict
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: Update an executor configuration
      tags:
      - Executors
      x-codegen-request-body-name: executorConfig
  /v1/provider-configurations:
    get:
      description: Retrieves a paginated list of provider configurations with optional
        filtering
      parameters:
      - description: Filter by status
        in: query
        name: status
        schema:
          enum:
          - active
          - disabled
          type: string
      - description: Filter by provider ID
        in: query
        name: providerId
        schema:
          type: string
      - description: Number of items per page
        in: query
        name: limit
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Sort field
        in: query
        name: sortBy
        schema:
          default: createdAt
          enum:
          - createdAt
          - updatedAt
          - name
          type: string
      - description: Sort order
        in: query
        name: sortOrder
        schema:
          default: DESC
          enum:
          - ASC
          - DESC
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ProviderConfigurationListOutput'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      summary: List provider configurations
      tags:
      - Provider Configurations
    post:
      description: Creates a new provider configuration validated against the provider's
        JSON Schema
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.CreateProviderConfigurationInput'
        description: Provider Configuration Input
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_flowker_pkg_model.ProviderConfigurationCreateOutput'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Not Found
        "409":
