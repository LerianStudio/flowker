      - application/json
      description: Receives a webhook callback and triggers the associated workflow
        execution. Runtime also accepts GET/PUT/DELETE/PATCH and nested-segment paths
        that Swagger 2.0 cannot express.
      parameters:
      - description: Webhook path registered by a workflow (Swagger 2.0 single segment;
          runtime accepts nested paths)
        in: path
        name: path
        required: true
        type: string
      - description: Optional idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Infrastructure API key enforced by AuthGuard when API-key auth
          is enabled
        in: header
        name: X-API-Key
        type: string
      - description: Per-webhook verification token (validated by the handler after
          AuthGuard)
        in: header
        name: X-Webhook-Token
        type: string
      - description: Webhook payload
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Workflow execution already terminal (sync response)
          schema:
            $ref: '#/definitions/github_com_LerianStudio_flowker_pkg_model.ExecutionCreateOutput'
        "201":
          description: Workflow execution created
          schema:
            $ref: '#/definitions/github_com_LerianStudio_flowker_pkg_model.ExecutionCreateOutput'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized (AuthGuard API-key failure or invalid/missing
            X-Webhook-Token)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: No webhook registered for this path/method, or workflow not
            found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Duplicate idempotency key
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "413":
          description: Webhook payload exceeds 1MB limit
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Workflow is not active
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Trigger a webhook
      tags:
      - Webhooks
