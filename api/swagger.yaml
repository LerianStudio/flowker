host: localhost:4021
info:
  contact: {}
  description: Workflow orchestration platform for financial validation
  termsOfService: http://swagger.io/terms/
  title: Flowker API
  version: 1.0.0
paths:
  /readyz:
    get:
      consumes:
      - application/json
      description: Returns dependency health status following canonical contract
      produces:
      - application/json
      responses:
        "200":
          description: Service is healthy - all dependencies up/skipped/n-a
          schema:
            $ref: '#/definitions/internal_adapters_http_in_readyz.Response'
        "503":
          description: Service is unhealthy - one or more dependencies down/degraded
          schema:
            $ref: '#/definitions/internal_adapters_http_in_readyz.Response'
      summary: Kubernetes readiness probe
      tags:
      - Health
  /v1/audit-events:
    get:
      description: Retrieves a paginated list of audit log entries with optional filtering
      parameters:
      - description: Filter by event type
        in: query
        name: eventType
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Filter by result
        enum:
        - SUCCESS
        - FAILED
        in: query
        name: result
        type: string
      - description: Filter by resource type
        enum:
        - workflow
        - execution
        - provider_config
        in: query
        name: resourceType
        type: string
      - description: Filter by resource ID
        format: uuid
        in: query
        name: resourceId
        type: string
      - description: Start date filter (RFC3339)
        format: date-time
        in: query
        name: dateFrom
        type: string
      - description: End date filter (RFC3339)
        format: date-time
        in: query
        name: dateTo
        type: string
      - default: 20
        description: Number of items per page
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - default: DESC
        description: Sort order
        enum:
        - ASC
        - DESC
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_flowker_pkg_model.AuditEntryListOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Search audit logs
      tags:
      - Audit
  /v1/audit-events/{id}:
    get:
      description: Retrieves a single audit log entry by its event ID
      parameters:
      - description: Audit event ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_flowker_pkg_model.AuditEntryOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get audit entry by ID
      tags:
      - Audit
  /v1/audit-events/{id}/verify:
    get:
      description: Verifies the hash chain integrity up to the specified audit entry
      parameters:
      - description: Audit event ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_LerianStudio_flowker_pkg_model.HashChainVerificationOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Verify audit hash chain
      tags:
      - Audit
  /v1/catalog/executors:
    get:
      description: Returns all built-in executors registered in the catalog
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_adapters_http_in_catalog.ExecutorSummary'
            type: array
      summary: List executors
      tags:
      - Catalog
  /v1/catalog/executors/{id}:
    get:
      description: Returns executor metadata and its JSON Schema
      parameters:
      - description: Executor ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapters_http_in_catalog.ExecutorDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/commons.Response'
      summary: Get executor
      tags:
      - Catalog
  /v1/catalog/executors/{id}/validate:
    post:
      consumes:
      - application/json
